syntax = "proto3";

option csharp_namespace = "ReportingBackend";

package reporting;

import "google/protobuf/timestamp.proto";

service ReportingService {
  rpc StreamTransactions (ReportRequest) returns (stream TransactionResponse);
}

message ReportRequest {
  string report_id = 1;
  int32 max_items = 2;
}

message TransactionResponse {
  string transaction_id = 1;
  string category = 2;
  double amount = 3;
  string status = 4;
  google.protobuf.Timestamp occurred_at = 5;
}
